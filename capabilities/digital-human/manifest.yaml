# digital-human 能力包自描述清单
# 类型: capability（预留占位）
#
# Phase 2 目标：仅声明 manifest，提供"接入接口契约"，
# 实际渲染 / 口型同步 / 表情驱动等渲染层实现交给后续迭代。
# 该包注入到骨架后不做任何代码注入，仅暴露 REST 端点占位。

name: "digital-human"
version: "0.1.0"
type: "capability"
description: "数字人能力包占位（渲染 / 口型同步 / 表情驱动）。仅声明接口契约，未启用渲染层"

dependencies:
  - name: "conversation-core"
    version: ">=1.0.0,<2.0.0"

extensions:
  - inject_at: "server.router_extension"
    inline_code: |
      # [digital-human] mount sub-router
      from ._capability_loader import try_load_capability as _try_load_capability
      _dh_router_mod = _try_load_capability("digital-human", "src/router.py")
      if _dh_router_mod is not None and hasattr(_dh_router_mod, "router"):
          app.include_router(
              _dh_router_mod.router, prefix="/api/v1/digital-human", tags=["digital-human"]
          )

config:
  enabled:
    description: "是否启用（占位实现，默认 false 避免误用）"
    default: false
  avatar_id:
    description: "默认数字人形象 ID（接入第三方渲染服务时使用）"
    default: ""
  lipsync_provider:
    description: "口型同步提供方占位"
    default: "tencent-cloud-vmp"
  expression_provider:
    description: "表情驱动提供方占位"
    default: "internal-rule"

endpoints:
  - method: GET
    path: /api/v1/digital-human/status
    description: 返回占位状态与未来计划
  - method: POST
    path: /api/v1/digital-human/render
    description: 渲染接口契约（当前返回 501 Not Implemented）

integration:
  mode: "manual"
  fallback:
    manual_api:
      rest_endpoint: "/api/v1/digital-human"
      sdk_packages: []

security:
  log_redaction:
    enabled: true
    patterns: ["api_key", "token"]

acceptance:
  - "manifest 通过 manifest_resolver 校验（依赖 / 注入点合法）"
  - "REST 占位接口返回明确的 'not implemented' 标记"
