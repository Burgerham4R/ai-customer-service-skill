# tool-calling 默认工具注册表 —— 通用 AI 客服工具集（行业中立）
#
# 双轨说明：
#   alpha（α 轨）= 本地函数 / mock 实现：开箱即用，无需真实后端，便于本地演示
#   beta （β 轨）= 远程 HTTPS API：接真实业务系统时把 endpoint 指向你的接口
# 默认 priority=alpha：优先走本地 mock；如需强制走真实接口可改 priority 或单次 invoke 传 priority=beta。
# 接口对不齐时，参照 INTERFACE_ADAPT.md 做请求 / 响应字段映射。

priority: alpha    # alpha | beta | manifest_order

tools:
  - name: query_order_status
    description: "查询单据/订单/工单状态（输入 order_id），通用客服高频动作"
    alpha:
      module: "capabilities.tool_calling.examples.local_tools"
      function: "query_order_status"
      timeout_ms: 600
    beta:
      endpoint: "https://api.example.com/v1/orders/status"
      method: "POST"
      timeout_ms: 5000
      headers: {}

  - name: get_business_info
    description: "查询营业信息：营业时间/地址/联系方式（topic=hours|address|contact|all）"
    alpha:
      module: "capabilities.tool_calling.examples.local_tools"
      function: "get_business_info"
      timeout_ms: 400
    beta:
      endpoint: "https://api.example.com/v1/business/info"
      method: "GET"
      timeout_ms: 5000
      headers: {}

  - name: book_appointment
    description: "创建预约/预订：餐厅订位、服务预约等（date, time_slot, party_size）"
    alpha:
      module: "capabilities.tool_calling.examples.local_tools"
      function: "book_appointment"
      timeout_ms: 800
    beta:
      endpoint: "https://api.example.com/v1/appointments"
      method: "POST"
      timeout_ms: 5000
      headers: {}

  - name: submit_feedback
    description: "提交满意度评分/反馈（rating 1-5, comment），会话尾部常见动作"
    alpha:
      module: "capabilities.tool_calling.examples.local_tools"
      function: "submit_feedback"
      timeout_ms: 400
    beta:
      endpoint: "https://api.example.com/v1/feedback"
      method: "POST"
      timeout_ms: 5000
      headers: {}
